// ─── ANIMATED NUMBER ──────────────────────────────────────────────────────────
function AnimNum({ value, duration = 800 }) {
  const [disp, setDisp] = useState(0);
  const raf = useRef(); const prev = useRef(0);
  useEffect(() => {
    const target = n(value); const start = prev.current; prev.current = target;
    const t0 = performance.now();
    const go = ts => {
      const p = Math.min((ts - t0) / duration, 1);
      setDisp(start + (target - start) * (1 - Math.pow(1 - p, 3)));
      if (p < 1) raf.current = requestAnimationFrame(go);
    };
    cancelAnimationFrame(raf.current);
    raf.current = requestAnimationFrame(go);
    return () => cancelAnimationFrame(raf.current);
  }, [value]);
  return <span>${Math.round(disp).toLocaleString()}</span>;
}

function TraitCard({ item }) {
  const [hovered, setHovered] = React.useState(false);
  return (
    <div

      style={{ background: hovered ? `${item.color}22` : "rgba(255,255,255,0.04)", border: `1px solid ${item.color}44`, borderTop: `3px solid ${item.color}`, borderRadius: 14, padding: "24px 20px", cursor: "default", transition: "background 0.2s", minHeight: 140, display: "flex", flexDirection: "column", justifyContent: "center" }}>

    </div>
  );
}
