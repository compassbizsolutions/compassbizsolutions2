// ─── ANIMATED NUMBER ──────────────────────────────────────────────────────────
function AnimNum({ value, duration = 800 }) {
  const [disp, setDisp] = useState(0);
  const raf = useRef(); const prev = useRef(0);
  useEffect(() => {
    const target = n(value); const start = prev.current; prev.current = target;
    const t0 = performance.now();
    const go = ts => {
      const p = Math.min((ts - t0) / duration, 1);
      setDisp(start + (target - start) * (1 - Math.pow(1 - p, 3)));
      if (p < 1) raf.current = requestAnimationFrame(go);
    };
    cancelAnimationFrame(raf.current);
    raf.current = requestAnimationFrame(go);
    return () => cancelAnimationFrame(raf.current);
  }, [value]);
  return <span>${Math.round(disp).toLocaleString()}</span>;
}

  const s = k => parseFloat(vals[k]) || 0;
  const set = (k,v) => setVals(p => ({...p,[k]:v}));

  const confirmMult = confirms==="no"?1.3:confirms==="sometimes"?1.1:1.0;
  const avgJob = s("bill")*3;
  const sched  = s("lost")*avgJob*50*confirmMult;
  const admin  = s("admin")*(s("bill")||75)*50;
  const veh    = s("trucks")*s("miles")*0.67*50 + s("runs")*((s("bill")||75)*0.75)*50;

// ─── INTAKE GATE ─────────────────────────────────────────────────────────────
function IntakeGate({ token, fallbackEmail, planType }) {
  const [status, setStatus] = useState("checking"); // checking | valid | invalid | no-token
  const [tokenEmail, setTokenEmail] = useState("");
  const [tokenPlan, setTokenPlan] = useState(planType || "249");

  useEffect(function() {
    if (!token) {
      // No token — allow direct access for testing/admin
      // In production, remove this and require token
      setTokenEmail(fallbackEmail || "");
      setTokenPlan(planType || "249");
      setStatus("valid");
      return;
    }
    fetch("/api/validate-intake-token", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.valid) {
        setTokenEmail(data.email || fallbackEmail);
        setTokenPlan(data.planType || planType || "249");
        setStatus("valid");
      } else {
        setStatus("invalid");
      }
    })
    .catch(function() { setStatus("invalid"); });
  }, [token]);

  function handleComplete(report) {
    // Burn token after completion
    if (token) {
      fetch("/api/validate-intake-token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, burn: true })
      }).catch(function() {});
    }
  }

  if (status === "checking") return (
    <div style={{ background: C.navyDark, borderRadius: 16, padding: "56px 32px", textAlign: "center", border: "1px solid rgba(61,107,158,0.2)" }}>
      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 20 }}>
        {[0,1,2].map(function(i) { return <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: C.amber, animation: "dot 1.2s ease-in-out " + (i * 0.2) + "s infinite" }} />; })}
      </div>
      <div style={{ fontFamily: F.d, fontSize: 18, fontWeight: 700, color: C.white }}>Verifying your access...</div>
    </div>
  );

  if (status === "no-token" || status === "invalid") return (
    <div style={{ background: C.navyDark, borderRadius: 16, padding: "48px 32px", textAlign: "center", border: "1px solid rgba(184,76,46,0.3)" }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>🔒</div>
      <div style={{ fontFamily: F.d, fontSize: 24, fontWeight: 800, color: C.white, marginBottom: 12 }}>
        {status === "invalid" ? "ACCESS LINK EXPIRED OR ALREADY USED" : "PURCHASE REQUIRED"}
      </div>
      <p style={{ fontFamily: F.b, fontSize: 14, color: "rgba(255,255,255,0.5)", lineHeight: 1.8, maxWidth: 460, margin: "0 auto 24px" }}>
        {status === "invalid"
          ? "This intake link has expired or has already been used. Check your purchase confirmation email for your link, or contact us if you need a new one."
          : "The in-depth intake is available after purchasing a plan. Start with the free diagnostic to see your top leaks, then choose the plan that's right for you."
        }
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, maxWidth: 360, margin: "0 auto" }}>
        {status === "no-token" && (
          <button onClick={function() { window.location.href = "/"; }}
            style={{ background: C.amber, border: "none", color: C.white, padding: "14px 32px", borderRadius: 10, fontSize: 14, fontWeight: 700, fontFamily: F.b, cursor: "pointer", boxShadow: "0 4px 20px rgba(200,112,26,0.35)" }}>
            Start Free Diagnostic →
          </button>
        )}
        <button onClick={function() { window.open("mailto:hello@compassbizsolutions.com?subject=Intake Link Request", "_blank"); }}
          style={{ background: "none", border: "1px solid rgba(255,255,255,0.2)", color: "rgba(255,255,255,0.6)", padding: "12px 32px", borderRadius: 10, fontSize: 13, fontFamily: F.b, cursor: "pointer" }}>
          Contact Us for Help
        </button>
      </div>
    </div>
  );

  // Valid token — show the intake
  return <InDepthIntake customerEmail={tokenEmail} planType={tokenPlan} onComplete={handleComplete} />;
}

function IntakeQ({ q, id, type, opts, ph, vals, setVals, multiVals, setMultiVals }) {
  const val = vals[id] || "";
  const mval = multiVals[id] || [];

  function setVal(v) { setVals(function(p) { const n = {}; Object.keys(p).forEach(function(k) { n[k] = p[k]; }); n[id] = v; return n; }); }
  function toggleM(o) { setMultiVals(function(p) { const n = {}; Object.keys(p).forEach(function(k) { n[k] = p[k]; }); const cur = p[id] || []; n[id] = cur.indexOf(o) >= 0 ? cur.filter(function(x) { return x !== o; }) : cur.concat([o]); return n; }); }

  const bBase = { border: "2px solid " + C.warm3, borderRadius: 7, padding: "8px 14px", fontSize: 12, fontFamily: F.b, cursor: "pointer", fontWeight: 600, background: C.white, color: C.body, transition: "all 0.15s" };
  const bSel  = { border: "2px solid " + C.navy, borderRadius: 7, padding: "8px 14px", fontSize: 12, fontFamily: F.b, cursor: "pointer", fontWeight: 700, background: C.navy, color: C.white, transition: "all 0.15s" };

  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontFamily: F.b, fontSize: 13, fontWeight: 600, color: C.ink, marginBottom: 10, lineHeight: 1.4 }}>{q}</div>
      {type === "buttons" && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {opts.map(function(o) { return <button key={o} onClick={function() { setVal(o); }} style={val === o ? bSel : bBase}>{o}</button>; })}
        </div>
      )}
      {type === "multi" && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {opts.map(function(o) { const sel = mval.indexOf(o) >= 0; return <button key={o} onClick={function() { toggleM(o); }} style={sel ? bSel : bBase}>{sel ? "✓ " : ""}{o}</button>; })}
        </div>
      )}
      {type === "text" && (
        <input value={val} onChange={function(e) { setVal(e.target.value); }} placeholder={ph}
          style={{ width: "100%", padding: "11px 14px", border: "2px solid " + C.warm3, borderRadius: 8, fontSize: 14, color: C.ink, outline: "none", fontFamily: F.b, background: C.white, boxSizing: "border-box" }} />
      )}
      {type === "textarea" && (
        <textarea value={val} onChange={function(e) { setVal(e.target.value); }} placeholder={ph} rows={3}
          style={{ width: "100%", padding: "11px 14px", border: "2px solid " + C.warm3, borderRadius: 8, fontSize: 14, color: C.ink, outline: "none", fontFamily: F.b, background: C.white, boxSizing: "border-box", resize: "vertical", lineHeight: 1.6 }} />
      )}
    </div>
  );
}

    return lines.join("\n");

          prompt: "Generate the full customized plan now based on all intake answers.",
          max_tokens: 4500
        })
      });
      const data = await res.json();

        method: "POST",
        headers: { "Content-Type": "application/json" },

          email: leadEmail, name: leadName, biz: leadBiz, phone: leadPhone, address: leadAddress,

        <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
        <div style={{ fontFamily: F.d, fontSize: 22, fontWeight: 800, color: C.ink, marginBottom: 8 }}>INTAKE COMPLETE</div>
        <p style={{ fontFamily: F.b, fontSize: 14, color: C.muted, lineHeight: 1.7, maxWidth: 440, margin: "0 auto 8px" }}>You answered {answered} questions across all 11 sections. We have everything we need to build your customized plan.</p>
        <p style={{ fontFamily: F.b, fontSize: 13, color: C.muted, lineHeight: 1.7, maxWidth: 440, margin: "0 auto 24px" }}>Your plan will be generated now and emailed to {customerEmail}. This takes about 30 seconds.</p>
        {err && <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "12px 16px", marginBottom: 16, fontSize: 13, color: C.red, fontFamily: F.b }}>{err}</div>}
        <button onClick={submit} style={{ background: C.amber, border: "none", color: C.white, padding: "16px 44px", borderRadius: 10, fontSize: 15, fontWeight: 700, fontFamily: F.b, cursor: "pointer", boxShadow: "0 4px 24px rgba(200,112,26,0.4)", marginBottom: 12 }}>
          Build My Plan →
        </button>
        <div>
          <button onClick={function() { setSection(1); }} style={{ background: "none", border: "none", color: C.muted, fontSize: 12, fontFamily: F.b, cursor: "pointer" }}>← Go back and review answers</button>
        </div>
      </div>
    );
  }

  // LOADING
  if (section === 13) return (
    <div style={{ background: C.navyDark, borderRadius: 16, padding: "56px 32px", textAlign: "center", border: "1px solid rgba(200,112,26,0.25)" }}>
      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 20 }}>
        {[0,1,2].map(function(i) { return <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: C.amber, animation: "dot 1.2s ease-in-out " + (i * 0.2) + "s infinite" }} />; })}
      </div>
      <div style={{ fontFamily: F.d, fontSize: 20, fontWeight: 700, color: C.white, marginBottom: 8 }}>BUILDING YOUR PLAN</div>
      <p style={{ fontFamily: F.b, fontSize: 13, color: "rgba(255,255,255,0.4)", lineHeight: 1.7 }}>Ranking your leaks by dollar impact.<br />Building your day-by-day plan.<br />Selecting your specific guides and process docs.<br />This takes about 30 seconds.</p>
    </div>
  );

  // DONE
  if (section === 14) return (
    <div style={{ background: C.navyDark, borderRadius: 16, padding: "48px 32px", textAlign: "center", border: "1px solid rgba(30,107,69,0.4)" }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>🎯</div>
      <div style={{ fontFamily: F.d, fontSize: 24, fontWeight: 800, color: C.white, marginBottom: 12 }}>YOUR PLAN IS ON ITS WAY</div>
      <p style={{ fontFamily: F.b, fontSize: 14, color: "rgba(255,255,255,0.55)", lineHeight: 1.8, maxWidth: 460, margin: "0 auto 8px" }}>Your customized plan has been sent to {leadEmail}. It includes your leak ranking, dollar estimates, day-by-day action plan, and the specific guides and process docs for your situation.</p>
      <p style={{ fontFamily: F.b, fontSize: 13, color: "rgba(255,255,255,0.35)", lineHeight: 1.7, maxWidth: 440, margin: "0 auto 0" }}>Check your inbox — and your spam folder just in case. Questions? Reply to the email and Jen reads every one.</p>
    </div>
  );

  return null;
}

// ─── DIAGNOSTIC TOOL ─────────────────────────────────────────────────────────
function DiagnosticTool({ setPage, paddle }) {
  const QUESTIONS = [
    { id:"trade", q:"What trade are you in?", type:"buttons",
      opts:["HVAC","Plumbing","Electrical","Landscaping","Pool and Spa","Pest Control","General Contracting","Cleaning Services","Roofing","Painting","Flooring","Tile and Stone","Carpet Cleaning","Air Duct Cleaning","Chimney and Fireplace","Garage Door","Gutters","Handyman","Irrigation","Locksmith","Appliance Repair","Tree Service","Pressure Washing","Restoration and Remediation","Security Systems","Solar","Other"] },
    { id:"services", q:"What do you do day to day? Pick all that apply.", type:"multi",
      opts:["Residential service calls","Commercial service calls","New installs","Maintenance agreements","Emergency calls","Estimates and bids","Inspections","Other"] },
    { id:"years", q:"How long have you been in business?", type:"buttons",
      opts:["Under 2 years","2-5 years","5-10 years","10-20 years","20+ years"] },
    { id:"crew", q:"How many guys do you have in the field?", type:"buttons",
      opts:["Just me","2-3","4-6","7-10","11-20","20+"] },
    { id:"trucks", q:"How many trucks?", type:"buttons",
      opts:["1","2-3","4-6","7-10","10+"] },
    { id:"jobs", q:"How many jobs do you complete per week?", type:"buttons",
      opts:["Under 10","10-20","20-40","40-60","60+"] },
    { id:"invoice", q:"What is your average invoice amount?", type:"buttons",
      opts:["Under $200","$200-$400","$400-$800","$800-$1,500","$1,500-$3,000","$3,000+"] },
    { id:"rate", q:"How do you charge for labor?", type:"buttons",
      opts:["Hourly rate","Flat fee per job","Mix of both","Not sure how to price it"] },
    { id:"tracking", q:"How do you track jobs from estimate to invoice?", type:"buttons",
      opts:["Software (ServiceTitan, Jobber etc)","QuickBooks only","Spreadsheets","Paper or memory","We do not track it"] },
    { id:"partsruns", q:"How often do your guys make unplanned parts runs?", type:"buttons",
      opts:["Almost never","1-2 per week","3-5 per week","Daily","Multiple times a day"] },
    { id:"invoicetiming", q:"When does the invoice go out after a job closes?", type:"buttons",
      opts:["Same day","Within 2-3 days","End of the week","Whenever I get to it","Often weeks later"] },
    { id:"repeat", q:"How much of your work is repeat vs new customers?", type:"buttons",
      opts:["Mostly new","About 50/50","Mostly repeat","We have maintenance agreements"] },
    { id:"rates", q:"When did you last raise your rates?", type:"buttons",
      opts:["Last 6 months","1-2 years ago","3-5 years ago","5+ years ago","Never"] },
    { id:"noshows", q:"How many no-shows or last-minute cancellations do you get per week?", type:"buttons",
      opts:["Almost none","1-2","3-5","More than 5","Way too many"] },
    { id:"timewaste", q:"What is eating your time that is not billable? Pick all that apply.", type:"multi",
      opts:["Chasing unpaid invoices","Parts runs","Phone calls while on jobs","Scheduling and rescheduling","Training new hires","Paperwork and admin","Estimating and quoting","Customer complaints"] },
    { id:"concerns", q:"Tell us what is really going on. What keeps you up at night about this business?", type:"area",
      ph:"The more specific you are the better we can help. No one else will see this." },
  ];

  const [step, setStep]         = useState(0);
  const [answers, setAnswers]   = useState({});
  const [current, setCurrent]   = useState("");
  const [multiSel, setMultiSel] = useState([]);
  const [name, setName]         = useState("");
  const [email, setEmail]       = useState("");
  const [biz, setBiz]           = useState("");
  const [phone, setPhone]       = useState("");
  const [result, setResult]     = useState(null);
  const [err, setErr]           = useState("");

  const totalQ = QUESTIONS.length;
  const q      = (step >= 1 && step <= totalQ) ? QUESTIONS[step - 1] : null;
  const pct    = step === 0 ? 0 : Math.round((step / (totalQ + 2)) * 100);

  function saveAndNext(val) {
    const value = val !== undefined ? val : (q && q.type === "multi" ? multiSel.join(", ") : current.trim());
    if (q && value) {
      const id = q.id;
      setAnswers(function(prev) {
        const next = {};
        Object.keys(prev).forEach(function(k) { next[k] = prev[k]; });
        next[id] = value;
        return next;
      });
    }
    setCurrent("");
    setMultiSel([]);
    setStep(function(s) { return s + 1; });
  }

  function toggleMulti(opt) {
    setMultiSel(function(prev) {
      if (prev.indexOf(opt) >= 0) return prev.filter(function(x) { return x !== opt; });
      return prev.concat([opt]);
    });
  }

  async function submit() {
    if (!name.trim() || !email.trim() || !biz.trim() || !phone.trim()) {
      setErr("Please fill in all fields.");
      return;
    }
    setErr("");
    setStep(19);
    try {
      const a = answers;
      const sys = "You are a straight-talking business consultant with 23 years fixing operations inside Fortune-level companies, now working exclusively with blue-collar service businesses. You know the 10 profit leaks cold: 1-Pricing, 2-Scheduling/no-shows, 3-Employee cost, 4-Recurring revenue, 5-Estimate-to-invoice gaps, 6-Cash flow, 7-Customer churn, 8-Materials markup, 9-Admin time drain, 10-Vehicles and parts.\n\nThis owner answered:\nTrade: " + (a.trade||"service") + "\nServices: " + (a.services||"") + "\nYears: " + (a.years||"") + "\nCrew: " + (a.crew||"") + "\nTrucks: " + (a.trucks||"") + "\nJobs/week: " + (a.jobs||"") + "\nAvg invoice: " + (a.invoice||"") + "\nLabor pricing: " + (a.rate||"") + "\nTracking: " + (a.tracking||"") + "\nParts runs: " + (a.partsruns||"") + "\nInvoice timing: " + (a.invoicetiming||"") + "\nRepeat vs new: " + (a.repeat||"") + "\nLast rate increase: " + (a.rates||"") + "\nNo-shows/week: " + (a.noshows||"") + "\nTime wasters: " + (a.timewaste||"") + "\nConcerns: " + (a.concerns||"") + "\n\nRespond ONLY with these exact tags, no other text:\n\n[HEADLINE]\nOne punchy sentence naming the single biggest problem in plain language.\n\n[WHAT_WE_SEE]\n3 short bullet points starting with • of what stands out from their answers. Each bullet max 15 words. Be specific to their actual numbers and situation.\n\n[TOP_LEAK]\nLine 1: Leak name in ALL CAPS — estimated annual cost as a dollar range based on their numbers (e.g. PRICING LEAK — estimated $18,000–$24,000/year)\nLine 2: One sentence explaining why this is happening in their specific situation.\nLine 3: One bullet starting with → naming the exact Fix-It Guide and/or Process Doc Template that fixes it.\n\n[SECOND_LEAK]\nSame 3-line format.\n\n[THIRD_LEAK]\nSame 3-line format.\n\n[LEAK_TOTAL]\nOne line only: a combined estimated annual profit leak range across all three leaks identified. Format exactly like: Estimated total annual profit leak: $XX,000–$XX,000\n\n[HOW_WE_HELP]\n2 sentences max. Tell them a customized 30-day action plan with only the guides and templates for their specific leaks is available from Compass Business Solutions. No prices.";
      const res = await fetch("/api/generate-report", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system: sys, prompt: "Generate the diagnostic report now.", max_tokens: 1800 })
      });
      const data = await res.json();
      const text = data.text || "";
      if (!text) throw new Error("empty");
      setResult(text);
      setStep(20);
      fetch("/api/send-diagnostic", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name, email: email, biz: biz, phone: phone, trade: answers.trade || "", answers: answers, report: text })
      }).catch(function() {});
    } catch(e) {
      setErr("Something went wrong. Please try again.");
      setStep(17);
    }
  }

  function getTag(text, tag) {
    const pattern = "\\[" + tag + "\\]([\\s\\S]*?)(?=\\[|$)";
    const m = text.match(new RegExp(pattern));
    return m ? m[1].trim() : "";
  }

  const bBase = { border: "2px solid " + C.warm3, borderRadius: 8, padding: "10px 14px", fontSize: 13, fontFamily: F.b, cursor: "pointer", fontWeight: 600, background: C.white, color: C.body };
  const bSel  = { border: "2px solid " + C.navy, borderRadius: 8, padding: "10px 14px", fontSize: 13, fontFamily: F.b, cursor: "pointer", fontWeight: 700, background: C.navy, color: C.white };

  if (step === 0) return (
    <div style={{ background: C.navyDark, borderRadius: 16, padding: "40px 32px", textAlign: "center", border: "1px solid rgba(61,107,158,0.2)" }}>
      <div style={{ fontSize: 44, marginBottom: 16 }}>🔍</div>
      <div style={{ fontFamily: F.d, fontSize: "clamp(22px,4vw,32px)", fontWeight: 800, color: C.white, marginBottom: 12 }}>FREE BUSINESS DIAGNOSTIC</div>
      <p style={{ fontFamily: F.b, fontSize: 15, color: "rgba(255,255,255,0.5)", lineHeight: 1.8, maxWidth: 460, margin: "0 auto 28px" }}>A few quick questions about your business. We will identify your top profit leaks and tell you exactly where the money is going. Free.</p>
      <button onClick={function() { setStep(1); }} style={{ background: C.amber, border: "none", color: C.white, padding: "16px 44px", borderRadius: 10, fontSize: 16, fontWeight: 700, fontFamily: F.b, cursor: "pointer", boxShadow: "0 4px 24px rgba(200,112,26,0.4)" }}>Start Free Diagnostic</button>
      <p style={{ fontFamily: F.b, fontSize: 12, color: "rgba(255,255,255,0.2)", marginTop: 16 }}>3 minutes. No credit card. No commitment.</p>
    </div>
  );

  if (step >= 1 && step <= totalQ) return (
    <div style={{ background: C.white, borderRadius: 16, padding: "28px 24px", border: "1px solid " + C.warm3, textAlign: "left" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
        <div style={{ flex: 1, height: 4, background: C.warm2, borderRadius: 99 }}>
          <div style={{ width: pct + "%", height: "100%", background: C.amber, borderRadius: 99, transition: "width 0.4s" }} />
        </div>
        <div style={{ fontFamily: F.b, fontSize: 12, color: C.muted }}>{step} of {totalQ}</div>
      </div>
      <div style={{ fontFamily: F.d, fontSize: "clamp(16px,3vw,21px)", fontWeight: 700, color: C.ink, marginBottom: 20, lineHeight: 1.35 }}>{q.q}</div>

      {q.type === "buttons" && (
        <div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
            {q.opts.map(function(opt) {
              const sel = current === opt || answers[q.id] === opt;
              return (
                <button key={opt} onClick={function() {
                  if (opt === "Other") { setCurrent("Other"); }
                  else { saveAndNext(opt); }
                }} style={sel ? bSel : bBase}>{opt}</button>
              );
            })}
          </div>
          {current === "Other" && (
            <div style={{ marginTop: 14 }}>
              <input autoFocus placeholder="Please describe your trade..."
                onChange={function(e) { setCurrent(e.target.value || "Other"); }}
                onKeyDown={function(e) { if (e.key === "Enter" && current.trim() && current !== "Other") saveAndNext(); }}
                style={{ width: "100%", padding: "13px 15px", border: "2px solid " + C.amber, borderRadius: 9, fontSize: 14, color: C.ink, outline: "none", fontFamily: F.b, background: C.white, boxSizing: "border-box" }} />
              <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 10 }}>
                <button onClick={function() { if (current.trim() && current !== "Other") saveAndNext(); }}
                  disabled={!current.trim() || current === "Other"}
                  style={{ background: (current.trim() && current !== "Other") ? C.amber : C.warm2, border: "none", color: (current.trim() && current !== "Other") ? C.white : C.ghost, padding: "11px 28px", borderRadius: 8, fontSize: 14, fontWeight: 700, fontFamily: F.b, cursor: (current.trim() && current !== "Other") ? "pointer" : "default" }}>
                  Next →
                </button>
              </div>
            </div>
          )}
          {step > 1 && (
            <button onClick={function() { setCurrent(""); setMultiSel([]); setStep(function(s) { return Math.max(1, s - 1); }); }}
              style={{ background: "none", border: "none", color: C.ghost, fontSize: 12, fontFamily: F.b, cursor: "pointer", marginTop: 14 }}>← Back</button>
          )}
        </div>
      )}

      {q.type === "multi" && (
        <div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 16 }}>
            {q.opts.map(function(opt) {
              const sel = multiSel.indexOf(opt) >= 0;
              return (
                <button key={opt} onClick={function() { toggleMulti(opt); }} style={sel ? bSel : bBase}>
                  {sel ? "✓ " : ""}{opt}
                </button>
              );
            })}
          </div>
          {multiSel.indexOf("Other") >= 0 && (
            <input value={current} onChange={function(e) { setCurrent(e.target.value); }}
              placeholder="Please describe..." autoFocus
              style={{ width: "100%", padding: "11px 14px", border: "2px solid " + C.amber, borderRadius: 8, fontSize: 14, color: C.ink, outline: "none", fontFamily: F.b, background: C.white, boxSizing: "border-box", marginBottom: 12 }} />
          )}
          <button onClick={function() {
            const finalSel = multiSel.map(function(s) { return s === "Other" && current.trim() ? current.trim() : s; });
            saveAndNext(finalSel.join(", "));
          }} disabled={multiSel.length === 0}
            style={{ background: multiSel.length ? C.amber : C.warm2, border: "none", color: multiSel.length ? C.white : C.ghost, padding: "11px 28px", borderRadius: 8, fontSize: 14, fontWeight: 700, fontFamily: F.b, cursor: multiSel.length ? "pointer" : "default" }}>
            Continue
          </button>
        </div>
      )}

      {q.type === "area" && (
        <div>
          <textarea autoFocus value={current} onChange={function(e) { setCurrent(e.target.value); }} placeholder={q.ph} rows={5}
            style={{ width: "100%", padding: "13px 15px", border: "2px solid " + C.warm3, borderRadius: 9, fontSize: 14, color: C.ink, outline: "none", fontFamily: F.b, background: C.white, boxSizing: "border-box", resize: "vertical", lineHeight: 1.65 }} />
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 12 }}>
            <button onClick={function() { saveAndNext("skipped"); }} style={{ background: "none", border: "none", color: C.muted, fontSize: 13, fontFamily: F.b, cursor: "pointer" }}>Skip</button>
            <button onClick={function() { saveAndNext(); }} disabled={!current.trim()}
              style={{ background: current.trim() ? C.amber : C.warm2, border: "none", color: current.trim() ? C.white : C.ghost, padding: "11px 28px", borderRadius: 8, fontSize: 14, fontWeight: 700, fontFamily: F.b, cursor: current.trim() ? "pointer" : "default" }}>
              {step === totalQ ? "Almost done" : "Next"}
            </button>
          </div>
        </div>
      )}

      {q.type !== "buttons" && (
        <button onClick={function() { setCurrent(""); setMultiSel([]); setStep(function(s) { return Math.max(1, s - 1); }); }}
          style={{ background: "none", border: "none", color: C.ghost, fontSize: 12, fontFamily: F.b, cursor: "pointer", marginTop: 16 }}>Back</button>
      )}
    </div>
  );

  if (step === 17 || step === 18) return (
    <div style={{ background: C.white, borderRadius: 16, padding: "32px 28px", border: "1px solid " + C.warm3 }}>
      <div style={{ fontFamily: F.d, fontSize: "clamp(18px,3vw,26px)", fontWeight: 800, color: C.ink, marginBottom: 8 }}>One last thing.</div>
      <p style={{ fontFamily: F.b, fontSize: 14, color: C.muted, lineHeight: 1.7, marginBottom: 24 }}>Where should we send your diagnostic report?</p>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }} className="calc-grid">
        <input value={name} onChange={function(e) { setName(e.target.value); }} placeholder="First name"
          style={{ padding: "13px 14px", border: "2px solid " + C.warm3, borderRadius: 9, fontSize: 14, color: C.ink, outline: "none", fontFamily: F.b }} />
        <input value={biz} onChange={function(e) { setBiz(e.target.value); }} placeholder="Business name"
          style={{ padding: "13px 14px", border: "2px solid " + C.warm3, borderRadius: 9, fontSize: 14, color: C.ink, outline: "none", fontFamily: F.b }} />
        <input value={email} onChange={function(e) { setEmail(e.target.value); }} placeholder="Email address" type="email"
          style={{ padding: "13px 14px", border: "2px solid " + C.warm3, borderRadius: 9, fontSize: 14, color: C.ink, outline: "none", fontFamily: F.b }} />
        <input value={phone} onChange={function(e) { setPhone(e.target.value); }} placeholder="Phone number" type="tel"
          style={{ padding: "13px 14px", border: "2px solid " + C.warm3, borderRadius: 9, fontSize: 14, color: C.ink, outline: "none", fontFamily: F.b }} />
      </div>
      {err && <div style={{ color: C.red, fontSize: 13, fontFamily: F.b, marginTop: 10 }}>{err}</div>}
      <button onClick={submit} style={{ width: "100%", background: C.amber, border: "none", color: C.white, padding: "15px", borderRadius: 10, fontSize: 15, fontWeight: 700, fontFamily: F.b, cursor: "pointer", marginTop: 20, boxShadow: "0 4px 20px rgba(200,112,26,0.35)" }}>Build My Diagnostic Report</button>
      <p style={{ fontFamily: F.b, fontSize: 11, color: C.muted, textAlign: "center", marginTop: 10 }}>We will email you a copy. No spam ever.</p>
    </div>
  );

  if (step === 19) return (
    <div style={{ background: C.navyDark, borderRadius: 16, padding: "56px 32px", textAlign: "center", border: "1px solid rgba(61,107,158,0.2)" }}>
      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 20 }}>
        {[0,1,2].map(function(i) { return <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: C.amber, animation: "dot 1.2s ease-in-out " + (i * 0.2) + "s infinite" }} />; })}
      </div>
      <div style={{ fontFamily: F.d, fontSize: 20, fontWeight: 700, color: C.white, marginBottom: 8 }}>BUILDING YOUR DIAGNOSTIC</div>
      <p style={{ fontFamily: F.b, fontSize: 13, color: "rgba(255,255,255,0.4)", lineHeight: 1.7 }}>Analyzing everything across all 10 profit leak categories.<br />About 15 seconds.</p>
    </div>
  );

  if (step === 20 && result) {
    const g = function(tag) { return getTag(result, tag); };
    return (
      <div style={{ textAlign: "left" }}>

function PaddleToast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: C.navyDark, color: C.white, padding: "14px 24px", borderRadius: 10, fontSize: 13, fontFamily: F.b, fontWeight: 600, zIndex: 999, boxShadow: "0 8px 32px rgba(0,0,0,0.4)", border: `1px solid ${C.amber}44`, maxWidth: 360, textAlign: "center", lineHeight: 1.5 }}>
      {msg}
      <button onClick={onClose} style={{ display: "block", margin: "8px auto 0", background: "none", border: "none", color: "rgba(255,255,255,0.4)", fontSize: 11, cursor: "pointer", fontFamily: F.b }}>dismiss</button>
    </div>
  );
}
