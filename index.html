<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixKit — Compass Business Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F7F5F2; color: #1A2332; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #F0EFED; } ::-webkit-scrollbar-thumb { background: #C8D0DC; border-radius: 3px; }
    input, textarea, select { font-family: 'DM Sans', sans-serif; }
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; }
    .tip-wrap { position: relative; display: inline-flex; align-items: center; }
    .tip-wrap .tip { display: none; position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: #1B2E4B; color: white; font-size: 12px; line-height: 1.5; padding: 8px 12px; border-radius: 8px; width: 220px; z-index: 99; font-family: 'DM Sans', sans-serif; box-shadow: 0 4px 16px rgba(0,0,0,0.2); pointer-events: none; }
    .tip-wrap:hover .tip { display: block; }
    .tip-wrap .tip::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #1B2E4B; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const C = {
  navy:"#1B2E4B",navyDark:"#111E31",navyLight:"#243A5E",
  amber:"#C8701A",amberLight:"#FDF3E7",
  red:"#B84C2E",redLight:"#FAE8E4",
  slate:"#3D6B9E",slateLight:"#E8EFF7",
  green:"#1E6B45",greenLight:"#E8F5EE",
  gold:"#A8782A",
  warm0:"#F7F5F2",warm1:"#F0EFED",warm2:"#E8E4DC",warm3:"#D8D4CD",
  white:"#FFFFFF",ink:"#1A2332",body:"#3E4E63",muted:"#6B7A90",ghost:"#A0ABBE",
};
const F = { d:"'Barlow Condensed', sans-serif", b:"'DM Sans', sans-serif" };

// ── FIELD DEFINITIONS ─────────────────────────────────────────────────────────
// intakeKey maps to the answer stored in customer.intake_answers
const FIELDS = {
  pricing_current_rate:      { label:"Current hourly rate",         intakeKey:"p1_rate",         help:"What you charge per hour or per job right now.",                                    prefix:"$" },
  pricing_loaded_cost:       { label:"Loaded cost per hour",        intakeKey:"e2_loaded_cost",  help:"Wages + taxes + benefits + insurance per tech per hour.",                          prefix:"$",suffix:"/hr" },
  pricing_markup_pct:        { label:"Materials markup %",          intakeKey:"m1_markup",       help:"% you add on top of materials cost. 25% on $100 part = bill $125.",               suffix:"%" },
  pricing_target_rate:       { label:"Target rate after fix",       intakeKey:null,              help:"Your minimum profitable rate after covering all costs + margin.",                  prefix:"$",suffix:"/hr" },
  sched_jobs_per_week:       { label:"Jobs per week",               intakeKey:"jobs",            help:"Average completed jobs in a normal week.",                                         suffix:" jobs" },
  sched_lost_per_week:       { label:"Lost slots per week",         intakeKey:"noshows",         help:"Jobs lost to no-shows, cancellations, or empty slots.",                            suffix:" slots" },
  sched_avg_job_value:       { label:"Average job value",           intakeKey:"invoice",         help:"Your typical invoice for a standard job.",                                         prefix:"$" },
  sched_fill_rate:           { label:"Slot fill rate %",            intakeKey:null,              help:"% of cancelled slots you successfully fill with another customer.",                suffix:"%" },
  emp_num_techs:             { label:"Number of techs",             intakeKey:"crew",            help:"Total field techs including yourself.",                                            suffix:" techs" },
  emp_loaded_cost:           { label:"Loaded cost per tech/hr",     intakeKey:"e2_loaded_cost",  help:"Full hourly cost: wages + taxes + benefits + insurance.",                          prefix:"$",suffix:"/hr" },
  emp_billable_pct:          { label:"Billable % per day",          intakeKey:null,              help:"What % of each tech's paid day is actually on a job.",                             suffix:"%" },
  emp_tardiness_hrs:         { label:"Hours lost to tardiness/wk",  intakeKey:null,              help:"Total hours lost across all trucks due to late starts each week.",                 suffix:" hrs" },
  rec_current_monthly:       { label:"Current monthly recurring",   intakeKey:"r2_agreement_detail", help:"Monthly revenue from maintenance plans or agreements right now.",              prefix:"$" },
  rec_plan_price:            { label:"Maintenance plan price/yr",   intakeKey:null,              help:"What you'll charge per year for your plan.",                                       prefix:"$" },
  rec_target_customers:      { label:"Customers to offer plan to",  intakeKey:null,              help:"How many existing customers you'll approach first.",                               suffix:" customers" },
  inv_close_rate:            { label:"Estimate close rate",         intakeKey:"i1_close",        help:"% of estimates that convert to paid jobs.",                                        suffix:"%" },
  inv_unbilled_per_job:      { label:"Avg unbilled extras/job",     intakeKey:null,              help:"Dollar value of work done beyond original scope not on invoice.",                  prefix:"$" },
  inv_change_order_threshold:{ label:"Change order threshold",      intakeKey:null,              help:"Jobs above this dollar amount need a signed change order before you proceed.",     prefix:"$" },
  cf_days_to_invoice:        { label:"Days job → invoice",          intakeKey:null,              help:"How many days after completing a job before you send the invoice.",                suffix:" days" },
  cf_days_to_pay:            { label:"Days invoice → payment",      intakeKey:null,              help:"How long customers typically take to pay after receiving the invoice.",            suffix:" days" },
  cf_outstanding_ar:         { label:"Outstanding receivables",     intakeKey:null,              help:"Total dollar value of all unpaid invoices right now.",                             prefix:"$" },
  cf_monthly_breakeven:      { label:"Monthly break-even",          intakeKey:"c2_breakeven",    help:"Minimum monthly revenue needed to cover all your costs.",                          prefix:"$" },
  churn_google_reviews:      { label:"Google reviews",              intakeKey:"ch4_reviews",     help:"Your current total number of Google reviews.",                                     suffix:" reviews" },
  churn_referral_pct:        { label:"% from referrals",            intakeKey:"ch7_referral_pct",help:"What portion of new customers come from referrals.",                              suffix:"%" },
  churn_repeat_rate:         { label:"Repeat customer rate",        intakeKey:null,              help:"% of customers who use you more than once.",                                       suffix:"%" },
  mat_weekly_spend:          { label:"Weekly materials spend",      intakeKey:null,              help:"Total spent on parts and materials across all jobs each week.",                    prefix:"$" },
  mat_current_markup:        { label:"Current markup %",            intakeKey:"m1_markup",       help:"Your current markup on materials. 0% = billing at cost.",                         suffix:"%" },
  mat_target_markup:         { label:"Target markup for trade",     intakeKey:null,              help:"Standard for your trade: Plumbing 20-35%, HVAC 15-30%, Electrical 15-25%.",      suffix:"%" },
  mat_shop_fee:              { label:"Shop supply fee per job",     intakeKey:null,              help:"Flat per-job fee for small consumables too small to line-item. Typically $15-$35.",prefix:"$" },
  admin_hours_pw:            { label:"Admin hours per week",        intakeKey:"a1_hours",        help:"Hours you personally spend on non-billable administrative work.",                  suffix:" hrs" },
  admin_billing_rate:        { label:"Your billing rate",           intakeKey:"p1_rate",         help:"Used to calculate the dollar cost of time spent on admin.",                       prefix:"$",suffix:"/hr" },
  admin_recoverable:         { label:"Recoverable hours/week",      intakeKey:null,              help:"Realistic estimate of admin hours you could eliminate or delegate.",              suffix:" hrs" },
  veh_num_trucks:            { label:"Number of trucks",            intakeKey:"trucks",          help:"Total vehicles in your fleet used for field work.",                               suffix:" trucks" },
  veh_parts_runs:            { label:"Parts runs/truck/week",       intakeKey:"v1_runs",         help:"Average unplanned trips to the supply house per truck per week.",                 suffix:" runs" },
  veh_monthly_cost:          { label:"Monthly cost per truck",      intakeKey:"v5_monthly_cost", help:"All-in monthly cost: payments + fuel + insurance + maintenance.",                 prefix:"$",suffix:"/mo" },
};

// Task text → relevant field IDs
const TRIGGERS = [
  { kw:["rate","pricing","price","markup","charge","hourly","break-even rate"],         fields:["pricing_current_rate","pricing_loaded_cost","pricing_markup_pct","pricing_target_rate"] },
  { kw:["schedule","cancellation","no-show","confirm","slot","appointment","fill"],      fields:["sched_jobs_per_week","sched_lost_per_week","sched_avg_job_value"] },
  { kw:["tech","employee","labor","crew","billable","tardiness","staff","onboard"],      fields:["emp_num_techs","emp_loaded_cost","emp_billable_pct"] },
  { kw:["maintenance plan","recurring","agreement","contract","monthly revenue"],        fields:["rec_current_monthly","rec_plan_price","rec_target_customers"] },
  { kw:["invoice","estimate","change order","scope","extra work","unbilled"],            fields:["inv_close_rate","inv_unbilled_per_job","inv_change_order_threshold"] },
  { kw:["cash","receivable","ar ","overdue","break-even","reserve","deposit","pay"],     fields:["cf_days_to_invoice","cf_days_to_pay","cf_outstanding_ar","cf_monthly_breakeven"] },
  { kw:["follow up","review","referral","churn","repeat customer","google"],             fields:["churn_google_reviews","churn_referral_pct","churn_repeat_rate"] },
  { kw:["material","parts","markup","shop supply","consumable"],                         fields:["mat_weekly_spend","mat_current_markup","mat_target_markup","mat_shop_fee"] },
  { kw:["admin","paperwork","invoicing software","automate","delegate","scheduling software"], fields:["admin_hours_pw","admin_billing_rate","admin_recoverable"] },
  { kw:["truck","fleet","parts run","restock","supply house","vehicle"],                 fields:["veh_num_trucks","veh_parts_runs","veh_monthly_cost"] },
];

function fieldsForTask(task) {
  if (!task) return [];
  const lower = task.toLowerCase();
  const found = new Set();
  TRIGGERS.forEach(t => { if (t.kw.some(k => lower.includes(k))) t.fields.forEach(f => found.add(f)); });
  return [...found].slice(0, 4);
}

function prefill(fieldId, intakeAnswers) {
  const f = FIELDS[fieldId];
  if (!f || !f.intakeKey || !intakeAnswers) return "";
  return intakeAnswers[f.intakeKey] || "";
}

// ── API ────────────────────────────────────────────────────────────────────────
async function api(path, method, body, token) {
  const h = { "Content-Type":"application/json" };
  if (token) h["Authorization"] = "Bearer " + token;
  const r = await fetch("/api/" + path, { method:method||"GET", headers:h, body:body?JSON.stringify(body):undefined });
  return r.json();
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────
function Tip({ text }) {
  return (
    <span className="tip-wrap" style={{ marginLeft:5 }}>
      <span style={{ width:15,height:15,borderRadius:"50%",background:C.warm2,border:"1px solid "+C.warm3,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,color:C.muted,fontWeight:700,cursor:"help" }}>?</span>
      <span className="tip">{text}</span>
    </span>
  );
}

// ── INLINE FIELD ──────────────────────────────────────────────────────────────
function InlineField({ fieldId, numbers, intakeAnswers, onChange }) {
  const f = FIELDS[fieldId];
  if (!f) return null;
  const pf = prefill(fieldId, intakeAnswers);
  const saved = numbers?.[fieldId];
  const val = saved !== undefined ? saved : (pf || "");
  const fromIntake = !saved && !!pf;

  return (
    <div style={{ background:fromIntake?C.slateLight:C.amberLight, border:"1px solid "+(fromIntake?C.slate+"44":C.amber+"33"), borderRadius:8, padding:"8px 10px", marginBottom:6 }}>
      <div style={{ display:"flex", alignItems:"center", marginBottom:4 }}>
        <span style={{ fontFamily:F.b, fontSize:11, fontWeight:600, color:fromIntake?C.slate:C.amber }}>{f.label}</span>
        <Tip text={f.help} />
        {fromIntake && <span style={{ marginLeft:6, fontFamily:F.b, fontSize:9, color:C.slate, background:"white", border:"1px solid "+C.slate+"33", borderRadius:99, padding:"1px 6px" }}>from intake</span>}
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:4 }}>
        {f.prefix && <span style={{ fontFamily:F.b, fontSize:13, color:C.muted }}>{f.prefix}</span>}
        <input value={val} onChange={e=>onChange(fieldId,e.target.value)}
          placeholder="Enter value"
          style={{ flex:1, padding:"5px 8px", border:"1px solid "+(fromIntake?C.slate+"33":C.warm3), borderRadius:6, fontSize:13, color:C.ink, fontFamily:F.b, background:"white", outline:"none", minWidth:0 }} />
        {f.suffix && <span style={{ fontFamily:F.b, fontSize:12, color:C.muted, whiteSpace:"nowrap" }}>{f.suffix}</span>}
      </div>
    </div>
  );
}

// ── PASSWORD FIELD — defined outside Login to prevent remount on re-render ────
function PwField({ value, onChange, placeholder, showPw, onToggleShow, err }) {
  const pwS = { width:"100%", padding:"13px 16px", paddingRight:52, border:"2px solid "+(err?C.red:C.warm3), borderRadius:10, fontSize:15, color:C.ink, outline:"none", fontFamily:F.b, background:C.white, boxSizing:"border-box" };
  return (
    <div style={{ position:"relative" }}>
      <input value={value} onChange={e=>onChange(e.target.value)} type={showPw?"text":"password"} placeholder={placeholder||"Password"} style={pwS} />
      <button onClick={onToggleShow} type="button"
        style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:C.muted, fontSize:12, fontFamily:F.b, cursor:"pointer", padding:4 }}>
        {showPw?"Hide":"Show"}
      </button>
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function Login({ onLogin }) {
  // steps: "login" | "create" | "forgot" | "reset_sent"
  const [step, setStep] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");

  // Check URL for ?reset= token on mount
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get("reset");
    const resetEmail = params.get("email");
    if (resetToken && resetEmail) {
      setEmail(decodeURIComponent(resetEmail));
      setStep("reset");
      window.history.replaceState({}, "", "/");
    }
  }, []);

  function validatePw(pw) {
    if (!pw || pw.length < 8) return "At least 8 characters required.";
    if (!/\d/.test(pw)) return "Must include at least one number.";
    if (!/[^a-zA-Z0-9]/.test(pw)) return "Must include at least one special character (! @ # $ etc).";
    return null;
  }

  async function handleLogin() {
    if (!email.trim() || !password) { setErr("Email and password required."); return; }
    setLoading(true); setErr("");
    const r = await api("login", "POST", { email: email.trim(), password });
    setLoading(false);
    if (r.success) {
      onLogin(r.token, r.customer);
    } else if (r.error === "no_password") {
      setStep("create");
      setMsg("Welcome! Create your password to get started.");
    } else {
      setErr(r.error || "Login failed. Please try again.");
    }
  }

  async function handleCreate(otpToken) {
    const pwErr = validatePw(password);
    if (pwErr) { setErr(pwErr); return; }
    if (password !== confirm) { setErr("Passwords don't match."); return; }
    setLoading(true); setErr("");
    const body = { email: email.trim(), password };
    if (otpToken) body.otpToken = otpToken;
    const r = await api("set-password", "POST", body);
    setLoading(false);
    if (r.success) onLogin(r.token, r.customer);
    else setErr(r.error || "Failed to set password.");
  }

  async function handleForgot() {
    if (!email.trim() || !email.includes("@")) { setErr("Enter your email first."); return; }
    setLoading(true); setErr("");
    await api("send-reset", "POST", { email: email.trim() });
    setLoading(false);
    setStep("reset_sent");
  }

  const iS = { width:"100%", padding:"13px 16px", border:"2px solid "+(err?C.red:C.warm3), borderRadius:10, fontSize:15, color:C.ink, outline:"none", fontFamily:F.b, background:C.white, boxSizing:"border-box" };
  const pwHint = <div style={{ fontFamily:F.b, fontSize:11, color:C.muted, lineHeight:1.5, marginTop:6 }}>8+ characters · at least one number · at least one special character (! @ # $ % etc)</div>;

  return (
    <div style={{ minHeight:"100vh", background:C.navy, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <img src="/logo.png" alt="Compass" style={{ width:68,height:68,borderRadius:"50%",background:"white",padding:5,objectFit:"contain",boxShadow:"0 4px 20px rgba(0,0,0,0.3)",marginBottom:14 }} />
          <div style={{ fontFamily:F.d, fontSize:34, fontWeight:800, color:C.white, letterSpacing:2, marginBottom:4 }}>FIXKIT</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", fontFamily:F.b }}>Compass Business Solutions — Customer Portal</div>
        </div>

        <div style={{ background:C.white, borderRadius:16, padding:"32px 28px", boxShadow:"0 24px 80px rgba(0,0,0,0.3)" }}>

          {/* ── SIGN IN ── */}
          {step === "login" && <>
            <div style={{ fontFamily:F.d, fontSize:22, fontWeight:800, color:C.ink, marginBottom:6 }}>SIGN IN</div>
            <p style={{ fontSize:13, color:C.muted, lineHeight:1.6, marginBottom:22, fontFamily:F.b }}>Use the email from your plan purchase.</p>
            <div style={{ marginBottom:12 }}>
              <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" type="email" autoFocus style={iS} />
            </div>
            <div style={{ marginBottom:6 }}>
              <PwField value={password} onChange={setPassword} showPw={showPw} onToggleShow={()=>setShowPw(s=>!s)} err={err} />
            </div>
            {err && <div style={{ color:C.red, fontSize:12, fontFamily:F.b, marginTop:4, marginBottom:4 }}>{err}</div>}
            <button onClick={handleLogin} disabled={loading}
              style={{ width:"100%", marginTop:14, background:C.amber, border:"none", color:"white", padding:"14px", borderRadius:10, fontSize:15, fontWeight:700, fontFamily:F.b, opacity:loading?.7:1 }}>
              {loading ? "Signing in..." : "Sign In →"}
            </button>
            <div style={{ display:"flex", justifyContent:"space-between", marginTop:14 }}>
              <button onClick={()=>{setStep("create");setMsg("Create your FixKit password.");setErr("");}}
                style={{ background:"none", border:"none", color:C.slate, fontSize:12, fontFamily:F.b, cursor:"pointer" }}>
                First time? Create password
              </button>
              <button onClick={()=>{setStep("forgot");setErr("");}}
                style={{ background:"none", border:"none", color:C.muted, fontSize:12, fontFamily:F.b, cursor:"pointer" }}>
                Forgot password?
              </button>
            </div>
          </>}

          {/* ── CREATE PASSWORD ── */}
          {(step === "create" || step === "reset") && <>
            <div style={{ fontFamily:F.d, fontSize:22, fontWeight:800, color:C.ink, marginBottom:6 }}>
              {step === "reset" ? "SET NEW PASSWORD" : "CREATE PASSWORD"}
            </div>
            {msg && <p style={{ fontSize:13, color:C.slate, lineHeight:1.6, marginBottom:18, fontFamily:F.b }}>{msg}</p>}
            <div style={{ marginBottom:12 }}>
              <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" type="email" style={iS} readOnly={step==="reset"} />
            </div>
            <div style={{ marginBottom:12 }}>
              <PwField value={password} onChange={setPassword} placeholder="Create password" showPw={showPw} onToggleShow={()=>setShowPw(s=>!s)} err={err} />
            </div>
            <div style={{ marginBottom:4 }}>
              <PwField value={confirm} onChange={setConfirm} placeholder="Confirm password" showPw={showPw} onToggleShow={()=>setShowPw(s=>!s)} err={err} />
            </div>
            {pwHint}
            {err && <div style={{ color:C.red, fontSize:12, fontFamily:F.b, marginTop:8 }}>{err}</div>}
            <button onClick={()=>handleCreate()} disabled={loading}
              style={{ width:"100%", marginTop:16, background:C.amber, border:"none", color:"white", padding:"14px", borderRadius:10, fontSize:15, fontWeight:700, fontFamily:F.b, opacity:loading?.7:1 }}>
              {loading ? "Saving..." : step==="reset" ? "Set New Password →" : "Create Password →"}
            </button>
            <button onClick={()=>{setStep("login");setErr("");setMsg("");}}
              style={{ width:"100%", marginTop:10, background:"none", border:"none", color:C.muted, fontSize:13, fontFamily:F.b }}>
              ← Back to sign in
            </button>
          </>}

          {/* ── FORGOT PASSWORD ── */}
          {step === "forgot" && <>
            <div style={{ fontFamily:F.d, fontSize:22, fontWeight:800, color:C.ink, marginBottom:6 }}>FORGOT PASSWORD</div>
            <p style={{ fontSize:13, color:C.muted, lineHeight:1.6, marginBottom:22, fontFamily:F.b }}>Enter your email and we'll send a reset link.</p>
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" type="email" autoFocus style={iS} />
            {err && <div style={{ color:C.red, fontSize:12, fontFamily:F.b, marginTop:6 }}>{err}</div>}
            <button onClick={handleForgot} disabled={loading}
              style={{ width:"100%", marginTop:16, background:C.amber, border:"none", color:"white", padding:"14px", borderRadius:10, fontSize:15, fontWeight:700, fontFamily:F.b, opacity:loading?.7:1 }}>
              {loading ? "Sending..." : "Send Reset Link →"}
            </button>
            <button onClick={()=>{setStep("login");setErr("");}}
              style={{ width:"100%", marginTop:10, background:"none", border:"none", color:C.muted, fontSize:13, fontFamily:F.b }}>
              ← Back to sign in
            </button>
          </>}

          {/* ── RESET SENT ── */}
          {step === "reset_sent" && <>
            <div style={{ textAlign:"center", padding:"10px 0" }}>
              <div style={{ fontSize:48, marginBottom:16 }}>📬</div>
              <div style={{ fontFamily:F.d, fontSize:22, fontWeight:800, color:C.ink, marginBottom:10 }}>CHECK YOUR EMAIL</div>
              <p style={{ fontSize:13, color:C.muted, lineHeight:1.7, fontFamily:F.b, marginBottom:24 }}>If that email has an account, a reset link is on its way. Check your inbox — it expires in 30 minutes.</p>
              <button onClick={()=>{setStep("login");setErr("");}}
                style={{ background:"none", border:"none", color:C.slate, fontSize:13, fontFamily:F.b, cursor:"pointer" }}>
                ← Back to sign in
              </button>
            </div>
          </>}

        </div>
      </div>
    </div>
  );
}

// ── TASK CARD ─────────────────────────────────────────────────────────────────
function TaskCard({ item, completed, onToggle, numbers, intakeAnswers, onSaveNum, color }) {
  const [open, setOpen] = useState(false);
  if (!item.day) return null;
  const num = parseInt(item.day.replace(/\D/g,""));
  const done = completed.includes(num);
  const flds = fieldsForTask(item.task);

  return (
    <div style={{ background:done?C.greenLight:C.white, border:"1px solid "+(done?C.green+"33":C.warm3), borderRadius:10, marginBottom:6, overflow:"hidden", transition:"all 0.15s" }}>
      <div style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"12px 14px", cursor:flds.length?"pointer":"default" }}
        onClick={()=>flds.length&&setOpen(o=>!o)}>

// ── PROGRESS TRACKER ──────────────────────────────────────────────────────────
function ProgressTracker({ days, progress, onSave, onSaveNum, saving, isBundle, numbers, intakeAnswers }) {
  const completed = progress?.completed||[];
  const active = days.filter(d=>d.day&&!d.locked);
  const total = active.length||30;
  const pct = Math.round((completed.length/total)*100);

  function toggle(num) {
    const n=Number(num);
    const next=completed.includes(n)?completed.filter(d=>d!==n):[...completed,n].sort((a,b)=>a-b);
    onSave(next);
  }

  const PH = {
    1:{label:"PHASE 1 — DAYS 1–30",sub:"Quick Wins",color:C.red},
    2:{label:"PHASE 2 — DAYS 31–60",sub:"Build Systems",color:C.amber},
    3:{label:"PHASE 3 — DAYS 61–90",sub:"Growth Moves",color:C.slate},
  };

  const phases = [1,2,3].map(p=>({ p, items:days.filter(d=>d.phase===p||(!d.phase&&p===1)) })).filter(x=>x.items.length);
  const buyUrls = { 2:"https://www.compassbizsolutions.com/checkout/60day", 3:"https://www.compassbizsolutions.com/checkout/90day" };

  return (
    <div>
      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:18 }}>
        {[{l:"COMPLETE",v:pct+"%",c:C.green},{l:"DAYS DONE",v:completed.length+"/"+total,c:C.amber},{l:"PLAN",v:isBundle?"90 Day":"30 Day",c:C.slate}].map(s=>(
          <div key={s.l} style={{ background:C.white, borderRadius:10, padding:"12px 10px", textAlign:"center", border:"1px solid "+C.warm3 }}>
            <div style={{ fontFamily:F.d, fontSize:22, fontWeight:800, color:s.c }}>{s.v}</div>
            <div style={{ fontFamily:F.b, fontSize:9, color:C.muted, letterSpacing:1, marginTop:2 }}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Bar */}
      <div style={{ background:C.warm2, borderRadius:99, height:8, marginBottom:18, overflow:"hidden" }}>
        <div style={{ width:pct+"%", height:"100%", background:C.amber, borderRadius:99, transition:"width 0.5s" }} />
      </div>

      {/* Hint */}
      <div style={{ background:C.navyDark, borderRadius:8, padding:"10px 14px", marginBottom:18 }}>
        <p style={{ fontFamily:F.b, fontSize:12, color:"rgba(255,255,255,0.5)", lineHeight:1.6, margin:0 }}>
          Tap any task to see the numbers that go with it — pre-filled from your intake. Tap the circle ○ to mark a day complete.
        </p>
      </div>

      {days.length===0?(
        <div style={{ textAlign:"center", padding:"40px 20px", color:C.muted, fontFamily:F.b, fontSize:13 }}>Your plan is being prepared. Check back shortly.</div>
      ):(
        phases.map(({p,items})=>{
          const ph=PH[p];
          const locked=!isBundle&&p>1;
          const pDays=items.filter(d=>d.day);
          const pDone=pDays.filter(d=>completed.includes(parseInt(d.day.replace(/\D/g,"")))).length;
          return (
            <div key={p} style={{ marginBottom:24 }}>
              <div style={{ background:locked?C.warm2:ph.color, borderRadius:"10px 10px 0 0", padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontFamily:F.d, fontSize:14, fontWeight:800, color:locked?C.muted:"white", letterSpacing:1 }}>{ph.label}</div>
                  <div style={{ fontFamily:F.b, fontSize:11, color:locked?C.ghost:"rgba(255,255,255,0.55)", marginTop:1 }}>{ph.sub}</div>
                </div>
                {locked?<span style={{fontSize:18}}>🔒</span>:<div style={{fontFamily:F.b,fontSize:12,color:"rgba(255,255,255,0.65)"}}>{pDone}/{pDays.length} done</div>}
              </div>
              {locked?(
                <div style={{ background:C.white, border:"1px solid "+C.warm3, borderTop:"none", borderRadius:"0 0 10px 10px", padding:"20px 16px", textAlign:"center" }}>
                  <div style={{ fontFamily:F.b, fontSize:13, color:C.muted, lineHeight:1.65, marginBottom:16 }}>
                    Complete your 30-day plan then keep going.<br/>Days {p===2?"31–60":"61–90"} are tailored to build on your progress.
                  </div>
                  <a href={buyUrls[p]} style={{ display:"inline-block", background:C.amber, color:"white", padding:"12px 28px", borderRadius:8, fontFamily:F.b, fontSize:14, fontWeight:700, textDecoration:"none" }}>
                    Unlock Phase {p} — $249 →
                  </a>
                </div>
              ):(
                <div style={{ background:C.warm0, border:"1px solid "+C.warm3, borderTop:"none", borderRadius:"0 0 10px 10px", padding:"10px" }}>
                  {items.map((item,i)=>{
                    if (item.sprint) return <div key={i} style={{ padding:"10px 6px 6px", fontFamily:F.b, fontSize:10, fontWeight:700, color:ph.color, letterSpacing:1.5, marginTop:i>0?4:0 }}>{item.sprint}</div>;
                    return <TaskCard key={i} item={item} completed={completed} onToggle={toggle} numbers={numbers} intakeAnswers={intakeAnswers} onSaveNum={onSaveNum} color={ph.color} />;
                  })}
                </div>
              )}
            </div>
          );
        })
      )}
      {saving&&<div style={{textAlign:"center",marginTop:12,fontSize:12,color:C.muted,fontFamily:F.b}}>Saving...</div>}
    </div>
  );
}

  const [pw,setPw]=useState(""); const [authed,setAuthed]=useState(false);

  const [err,setErr]=useState(""); const [filter,setFilter]=useState("all");

  async function login() {
    setLoading(true); setErr("");
    const r=await api("jen-dashboard","POST",{password:pw});
    setLoading(false);
    if (r.success){setCustomers(r.customers);setAuthed(true);}else setErr("Incorrect password.");
  }

  const filtered=customers.filter(c=>filter==="all"||c.status===filter);
  const counts={all:customers.length,red:customers.filter(c=>c.status==="red").length,yellow:customers.filter(c=>c.status==="yellow").length,green:customers.filter(c=>c.status==="green").length};

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {[["all","All"],["red","Needs Attention"],["yellow","Watch"],["green","Active"]].map(([f,l])=>(

function JenChat({ token }) {
  const [open, setOpen] = useState(false);
  const [dismissed, setDismissed] = useState(() => localStorage.getItem("jen_chat_dismissed") === "1");
  const [messages, setMessages] = useState([
    { role: "assistant", content: "Hey — I'm Jen. Ask me anything about your plan, your numbers, or how to fix a leak in your business. I'm here." }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = React.useRef(null);

  useEffect(() => {
    if (open && bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [messages, open]);

  function dismiss() {
    setDismissed(true);
    setOpen(false);
    localStorage.setItem("jen_chat_dismissed", "1");
  }

  async function send() {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput("");
    const history = messages.slice(1); // exclude opening greeting from history
    setMessages(prev => [...prev, { role: "user", content: userMsg }]);
    setLoading(true);

    try {
      const r = await api("ask-jen", "POST", { message: userMsg, history }, token);
      setMessages(prev => [...prev, { role: "assistant", content: r.reply || "Something went wrong. Try again." }]);
    } catch(e) {
      setMessages(prev => [...prev, { role: "assistant", content: "Having trouble connecting. Try again in a moment." }]);
    }
    setLoading(false);
  }

  // Show hint tooltip if not dismissed and not open
  if (dismissed && !open) return null;

  return (
    <div style={{ position: "fixed", bottom: 20, right: 20, zIndex: 500 }}>

      {/* Hint badge — shown once until they open or dismiss */}
      {!open && !dismissed && (
        <div style={{ position: "absolute", bottom: 56, right: 0, background: C.navy, borderRadius: "10px 10px 0 10px", padding: "10px 14px", width: 220, boxShadow: "0 4px 20px rgba(0,0,0,0.2)", marginBottom: 4 }}>
          <div style={{ fontFamily: F.b, fontSize: 12, color: "white", lineHeight: 1.5, marginBottom: 8 }}>
            Have a question? I'm Jen — ask me anything about your plan.
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setOpen(true)} style={{ flex: 1, background: C.amber, border: "none", color: "white", padding: "7px", borderRadius: 6, fontSize: 12, fontWeight: 700, fontFamily: F.b, cursor: "pointer" }}>
              Ask Jen
            </button>
            <button onClick={dismiss} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "rgba(255,255,255,0.5)", padding: "7px 10px", borderRadius: 6, fontSize: 12, fontFamily: F.b, cursor: "pointer" }}>
              Dismiss
            </button>
          </div>
        </div>
      )}

      {/* Chat window */}
      {open && (
        <div style={{ position: "absolute", bottom: 56, right: 0, width: 320, maxWidth: "calc(100vw - 40px)", background: C.white, borderRadius: 16, boxShadow: "0 8px 40px rgba(0,0,0,0.2)", overflow: "hidden", display: "flex", flexDirection: "column" }}>
          {/* Header */}
          <div style={{ background: C.navy, padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <img src="/logo.png" alt="Jen" style={{ width: 28, height: 28, borderRadius: "50%", background: "white", padding: 2, objectFit: "contain" }} />
              <div>
                <div style={{ fontFamily: F.d, fontSize: 14, fontWeight: 800, color: C.white, letterSpacing: 1 }}>ASK JEN</div>
                <div style={{ fontFamily: F.b, fontSize: 10, color: "rgba(255,255,255,0.4)" }}>Compass Business Solutions</div>
              </div>
            </div>
            <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.4)", fontSize: 20, cursor: "pointer", lineHeight: 1, padding: 4 }}>×</button>
          </div>

          {/* Messages */}
          <div style={{ flex: 1, overflowY: "auto", padding: "14px 14px 6px", maxHeight: 320, display: "flex", flexDirection: "column", gap: 10 }}>
            {messages.map((m, i) => (
              <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
                <div style={{
                  maxWidth: "85%", padding: "9px 12px", borderRadius: m.role === "user" ? "12px 12px 2px 12px" : "12px 12px 12px 2px",
                  background: m.role === "user" ? C.amber : C.warm1,
                  fontFamily: F.b, fontSize: 13, color: m.role === "user" ? "white" : C.body, lineHeight: 1.55,
                }}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div style={{ display: "flex", justifyContent: "flex-start" }}>
                <div style={{ background: C.warm1, borderRadius: "12px 12px 12px 2px", padding: "9px 14px" }}>
                  <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                    {[0,1,2].map(i => (
                      <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: C.muted, animation: "none", opacity: 0.4 + i * 0.2 }} />
                    ))}
                  </div>
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          {/* Input */}
          <div style={{ padding: "10px 12px", borderTop: "1px solid " + C.warm2, display: "flex", gap: 8 }}>
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && !e.shiftKey && send()}
              placeholder="Ask anything..."
              style={{ flex: 1, padding: "9px 12px", border: "1px solid " + C.warm3, borderRadius: 8, fontSize: 13, fontFamily: F.b, color: C.ink, outline: "none", background: C.warm0 }}
            />
            <button onClick={send} disabled={loading || !input.trim()}
              style={{ background: C.amber, border: "none", color: "white", padding: "9px 14px", borderRadius: 8, fontSize: 13, fontWeight: 700, fontFamily: F.b, opacity: (!input.trim() || loading) ? 0.5 : 1, cursor: !input.trim() || loading ? "default" : "pointer" }}>
              →
            </button>
          </div>

          {/* Disclaimer */}
          <div style={{ padding: "6px 12px 10px", fontFamily: F.b, fontSize: 10, color: C.ghost, lineHeight: 1.4, textAlign: "center" }}>
            Operational advice only — not tax, legal, or investment advice
          </div>
        </div>
      )}

      {/* Bubble button */}
      <button onClick={() => setOpen(o => !o)}
        style={{ width: 44, height: 44, borderRadius: "50%", background: open ? C.navy : C.amber, border: "none", color: "white", fontSize: open ? 20 : 18, cursor: "pointer", boxShadow: "0 4px 16px rgba(0,0,0,0.2)", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s" }}>
        {open ? "×" : "?"}
      </button>
    </div>
  );
}

// ── INTAKE ONBOARDING ─────────────────────────────────────────────────────────
function IntakeOnboarding({ token, customer, onComplete }) {
  const [section, setSection] = useState(0); // 0=welcome, 1-11=sections, 12=generating
  const [vals, setVals] = useState({});
  const [multiVals, setMultiVals] = useState({});
  const [err, setErr] = useState("");

  // Pre-fill from customer record if available
  const [name, setName] = useState(customer.name || "");
  const [biz, setBiz] = useState(customer.biz || "");
  const [phone, setPhone] = useState(customer.phone || "");
  const [address, setAddress] = useState(customer.address || "");
  const [trade, setTrade] = useState(customer.trade || "");

  const isBundle = customer.plan_type === "bundle" || customer.plan_type === "599";
  const firstName = name.split(" ")[0] || "there";
  const pct = section === 0 ? 0 : section >= 11 ? 95 : Math.round((section / 11) * 100);

  function setVal(id, v) { setVals(p => ({ ...p, [id]: v })); }
  function toggleMulti(id, v) {
    setMultiVals(p => {
      const cur = p[id] || [];
      return { ...p, [id]: cur.includes(v) ? cur.filter(x => x !== v) : [...cur, v] };
    });
  }

  function Btn({ id, v, multi }) {
    const active = multi ? (multiVals[id] || []).includes(v) : vals[id] === v;
    return (
      <button onClick={() => multi ? toggleMulti(id, v) : setVal(id, v)}
        style={{ padding:"9px 14px", borderRadius:8, border:"2px solid "+(active?C.amber:C.warm3), background:active?C.amberLight:C.white, color:active?C.amber:C.body, fontSize:13, fontWeight:active?700:500, fontFamily:F.b, cursor:"pointer", margin:"0 6px 6px 0", transition:"all 0.15s" }}>
        {v}
      </button>
    );
  }

  function Q({ id, label, type, opts, ph, multi }) {
    return (
      <div style={{ marginBottom:20 }}>
        <div style={{ fontFamily:F.b, fontSize:14, fontWeight:600, color:C.ink, marginBottom:10, lineHeight:1.4 }}>{label}</div>
        {type === "buttons" && <div style={{ display:"flex", flexWrap:"wrap" }}>{opts.map(o => <Btn key={o} id={id} v={o} multi={multi} />)}</div>}
        {type === "multi" && <div style={{ display:"flex", flexWrap:"wrap" }}>{opts.map(o => <Btn key={o} id={id} v={o} multi={true} />)}</div>}
        {type === "text" && <input value={vals[id]||""} onChange={e=>setVal(id,e.target.value)} placeholder={ph||""} style={{ width:"100%", padding:"11px 14px", border:"2px solid "+C.warm3, borderRadius:8, fontSize:14, fontFamily:F.b, color:C.ink, outline:"none", boxSizing:"border-box" }} />}

      </div>
    );
  }

  const sections = [
    { label:"PRICING", color:C.red, content: <>
      <Q id="p1_rate" label="What is your current hourly rate or flat fee per job?" type="text" ph="e.g. $95/hr or $250 flat fee" />

      <Q id="p3_loaded" label="Do you know your true loaded cost per hour — wages, truck, insurance, and overhead combined?" type="buttons" opts={["Yes exactly","Rough idea","Not really","No"]} />
      <Q id="p4_rates_increase" label="When did you last raise your rates?" type="buttons" opts={["Last 6 months","1-2 years ago","3-5 years ago","5+ years ago","Never"]} />

    </> },
    { label:"SCHEDULING", color:C.amber, content: <>

    { label:"MATERIALS MARKUP", color:C.navy, content: <>

      <Q id="a2_scheduling" label="Who handles scheduling and dispatch?" type="buttons" opts={["Me","Office staff","Shared","Nobody — it's chaos"]} />

        {/* Animated dots */}
        <div style={{ display:"flex", justifyContent:"center", gap:8 }}>
          {[0,1,2].map(i=>(
            <div key={i} style={{ width:10,height:10,borderRadius:"50%",background:C.amber,opacity:0.3+(i*0.35) }} />
          ))}
        </div>
        {err && (
          <div style={{ marginTop:20, background:"rgba(184,76,46,0.2)", borderRadius:8, padding:"12px 16px" }}>
            <p style={{ fontFamily:F.b,fontSize:13,color:"#ffaaaa",margin:"0 0 10px" }}>{err}</p>
            <button onClick={generatePlan} style={{ background:C.amber,border:"none",color:"white",padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:700,fontFamily:F.b,cursor:"pointer" }}>Try Again</button>
          </div>
        )}
      </div>
    </div>
  );

  // Section screens
  const sec = sections[section - 1];
  return (
    <div style={{ minHeight:"100vh", background:C.warm0 }}>
      {/* Header */}
      <div style={{ background:C.navy, padding:"0 20px", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ maxWidth:600, margin:"0 auto", display:"flex", alignItems:"center", height:52, gap:12 }}>
          <img src="/logo.png" alt="Compass" style={{ width:28,height:28,borderRadius:"50%",background:"white",padding:2,objectFit:"contain" }} />
          <div style={{ fontFamily:F.d,fontSize:14,fontWeight:800,color:C.white,letterSpacing:2,flex:1 }}>FIXKIT INTAKE</div>
          <div style={{ fontFamily:F.b,fontSize:11,color:"rgba(255,255,255,0.4)" }}>Section {section} of 11</div>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ background:C.warm2, height:4 }}>
        <div style={{ width:pct+"%", height:"100%", background:C.amber, transition:"width 0.4s" }} />
      </div>

      <div style={{ maxWidth:600, margin:"0 auto", padding:"24px 20px 80px" }}>
        {/* Section header */}
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:24 }}>
          <div style={{ width:36,height:36,borderRadius:"50%",background:sec.color,display:"flex",alignItems:"center",justifyContent:"center" }}>
            <span style={{ fontFamily:F.b,fontSize:13,fontWeight:700,color:"white" }}>{String(section).padStart(2,"0")}</span>
          </div>
          <div style={{ fontFamily:F.d,fontSize:22,fontWeight:800,color:sec.color,letterSpacing:1 }}>{sec.label}</div>
        </div>

        {/* Questions */}
        {sec.content}

        {/* Navigation */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:8 }}>
          <button onClick={()=>setSection(s=>Math.max(0,s-1))}
            style={{ background:"none",border:"none",color:C.muted,fontSize:13,fontFamily:F.b,cursor:"pointer",padding:"10px 0" }}>
            ← Back
          </button>
          {section < 11 ? (
            <button onClick={()=>setSection(s=>s+1)}
              style={{ background:sec.color,border:"none",color:"white",padding:"12px 28px",borderRadius:10,fontSize:14,fontWeight:700,fontFamily:F.b,cursor:"pointer" }}>
              Next →
            </button>
          ) : (
            <button onClick={generatePlan}
              style={{ background:C.green,border:"none",color:"white",padding:"13px 28px",borderRadius:10,fontSize:14,fontWeight:700,fontFamily:F.b,cursor:"pointer" }}>
              Build My Plan →
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [token,setToken]=useState(()=>localStorage.getItem("fixkit_token")||"");
  const [customer,setCustomer]=useState(()=>{try{return JSON.parse(localStorage.getItem("fixkit_customer")||"null");}catch(e){return null;}});
  const [intakeComplete,setIntakeComplete]=useState(false);

  function login(t,c){
    localStorage.setItem("fixkit_token",t);
    localStorage.setItem("fixkit_customer",JSON.stringify(c));
    setToken(t);
    setCustomer(c);
    setIntakeComplete(c.intake_complete || false);
  }

  function logout(){
    localStorage.removeItem("fixkit_token");
    localStorage.removeItem("fixkit_customer");
    setToken("");setCustomer(null);setIntakeComplete(false);
  }

  function handleIntakeComplete(){
    // Reload customer record from portal-data to get updated intake_complete flag
    api("portal-data","GET",null,token).then(r=>{
      if(r.customer){
        const updated = Object.assign({},customer,{intake_complete:true});
        localStorage.setItem("fixkit_customer",JSON.stringify(updated));
        setCustomer(updated);
        setIntakeComplete(true);
      }
    });
  }

  if (!token||!customer) return <Login onLogin={login} />;
  if (!intakeComplete && !customer.intake_complete) return <IntakeOnboarding token={token} customer={customer} onComplete={handleIntakeComplete} />;
  return <Portal token={token} customer={customer} onLogout={logout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
